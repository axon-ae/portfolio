<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Axon — Видео Портфолио</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap');

    :root { --accent: #a78bfa; }
    body { font-family: 'Inter', sans-serif; background: #050505; color: white; }
    .title-font { font-family: 'Space Grotesk', sans-serif; }

    .video-card {
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .video-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
    }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="fixed top-0 w-full bg-black/90 backdrop-blur-xl z-50 border-b border-white/10">
    <div class="max-w-7xl mx-auto px-6 py-6 flex justify-between items-center">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 bg-violet-500 rounded-2xl flex items-center justify-center font-black text-3xl">A</div>
        <h1 class="text-4xl font-bold title-font">AXON</h1>
      </div>
      <a href="#contact" class="px-8 py-3 bg-white text-black rounded-3xl font-medium hover:bg-violet-500 hover:text-white transition">Связаться</a>
    </div>
  </nav>

  <!-- HERO -->
  <section class="min-h-screen flex items-center justify-center bg-black pt-20">
    <div class="text-center px-6 max-w-4xl">
      <h1 class="text-7xl md:text-[110px] font-black title-font tracking-tighter leading-none mb-6">Я — AXON</h1>
      <p class="text-3xl text-zinc-400 mb-12">Видеомонтажёр • Motion Designer • 2026</p>
      <a href="#portfolio" class="inline-block px-14 py-7 bg-white text-black text-2xl font-semibold rounded-3xl hover:bg-violet-400 hover:text-white transition">Смотреть работы ↓</a>
    </div>
  </section>

  <!-- PORTFOLIO -->
  <section id="portfolio" class="py-32 bg-zinc-950">
    <div class="max-w-7xl mx-auto px-6">
      <h2 class="text-6xl font-bold title-font mb-16 text-center">Мои работы</h2>
      <div class="grid md:grid-cols-2 gap-10">
        <div onclick="openVideo('9bZkp7q19f0')" class="video-card bg-zinc-900 rounded-3xl overflow-hidden cursor-pointer">
          <img src="https://picsum.photos/id/1015/800/450" class="w-full">
          <div class="p-8">
            <h3 class="text-2xl font-semibold">Reel 2026</h3>
            <p class="text-violet-400">Premiere + After Effects • 1:32</p>
          </div>
        </div>
        <div onclick="openVideo('3JZ_D3ELwOQ')" class="video-card bg-zinc-900 rounded-3xl overflow-hidden cursor-pointer">
          <img src="https://picsum.photos/id/201/800/450" class="w-full">
          <div class="p-8">
            <h3 class="text-2xl font-semibold">Logo Animation</h3>
            <p class="text-violet-400">Motion Design • 0:45</p>
          </div>
        </div>
        <!-- ещё 2 карточки (всего 4 — быстро грузится) -->
        <div onclick="openVideo('jNQXAC9IVRw')" class="video-card bg-zinc-900 rounded-3xl overflow-hidden cursor-pointer">
          <img src="https://picsum.photos/id/237/800/450" class="w-full">
          <div class="p-8">
            <h3 class="text-2xl font-semibold">Fashion Campaign</h3>
            <p class="text-violet-400">Commercial • 2:10</p>
          </div>
        </div>
        <div onclick="openVideo('VIDEO_ID_4')" class="video-card bg-zinc-900 rounded-3xl overflow-hidden cursor-pointer">
          <img src="https://picsum.photos/id/29/800/450" class="w-full">
          <div class="p-8">
            <h3 class="text-2xl font-semibold">Music Video</h3>
            <p class="text-violet-400">VFX + Color • 0:58</p>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- CONTACT -->
  <section id="contact" class="py-32 bg-black text-center">
    <h2 class="text-6xl font-bold title-font mb-8">Давай работать вместе</h2>
    <a href="mailto:axon@video.studio" class="text-3xl border-b-2 border-violet-400 hover:text-violet-400">axon@video.studio</a>
  </section>

  <!-- MODAL -->
  <div id="modal" class="hidden fixed inset-0 bg-black/95 z-50 flex items-center justify-center">
    <div class="bg-zinc-900 rounded-3xl max-w-5xl w-full mx-4 overflow-hidden">
      <button onclick="closeModal()" class="absolute top-6 right-6 text-5xl">×</button>
      <div id="modal-video" class="aspect-video"></div>
    </div>
  </div>

  <script>
    function openVideo(id) {
      document.getElementById('modal-video').innerHTML = 
        `<iframe width="100%" height="100%" src="https://www.youtube.com/embed/${id}?autoplay=1" frameborder="0" allowfullscreen></iframe>`;
      document.getElementById('modal').classList.remove('hidden');
      document.getElementById('modal').classList.add('flex');
    }
    function closeModal() {
      const m = document.getElementById('modal');
      m.classList.add('hidden');
      m.classList.remove('flex');
      document.getElementById('modal-video').innerHTML = '';
    }
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
  </script>
</body>
</html>
